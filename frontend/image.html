<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Details — Novichok</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <span class="site-title">Novichok</span>
    </header>

    <main class="main-container">
        <a href="nalanda.html" class="back-btn">← Back</a>

        <section class="image-detail">
            <div class="detail-img-wrap">
                <img id="detailImage" src="" alt="" class="detail-img">
            </div>

            <h1 id="detailTitle" class="detail-title"></h1>
            <p id="detailDesc" class="detail-desc"></p>

            <table class="meta-table">
                <tbody>
                    <tr><th scope="row">Category</th><td id="metaCategory"></td></tr>
                    <tr><th scope="row">Country</th><td id="metaCountry"></td></tr>
                    <tr><th scope="row">Source</th><td id="metaSource"></td></tr>
                    <tr><th scope="row">Date</th><td id="metaDate"></td></tr>
                    <tr><th scope="row">Resolution</th><td id="metaResolution"></td></tr>
                </tbody>
            </table>

            <div class="action-btns">
                <button id="downloadBtn" class="btn btn-dark" type="button">Download Image</button>
                <button id="copyLinkBtn" class="btn btn-dark" type="button">Copy Link</button>
            </div>

            <nav class="prev-next-nav">
                <button id="prevBtn" class="btn btn-outline" type="button">← Previous</button>
                <button id="nextBtn" class="btn btn-outline" type="button">Next →</button>
            </nav>
        </section>

        <section class="related-section">
            <h2 class="related-heading">Related Images</h2>
            <div id="relatedGrid" class="gallery-grid related-grid"></div>
        </section>
    </main>

    <script type="module">
        import { fetchMediaById, fetchMedia } from './js/api.js';

        const urlParams = new URLSearchParams(window.location.search);
        const imageId = parseInt(urlParams.get('id')) || 1;

        async function loadDetail() {
            try {
                const img = await fetchMediaById(imageId);
                document.title = `${img.title} — Novichok`;

                document.getElementById('detailImage').src = img.cloudinary_url;
                document.getElementById('detailImage').alt = img.title;
                document.getElementById('detailTitle').textContent = img.title;
                document.getElementById('detailDesc').textContent = img.description || '';
                document.getElementById('metaCategory').textContent = img.category || '—';
                document.getElementById('metaCountry').textContent = img.country || '—';
                document.getElementById('metaSource').textContent = img.source || '—';
                document.getElementById('metaDate').textContent = img.capture_date || img.uploaded_at || '—';
                document.getElementById('metaResolution').textContent = img.resolution || '—';

                // Download button
                document.getElementById('downloadBtn').addEventListener('click', () => {
                    window.open(img.cloudinary_url, '_blank');
                });

                // Copy Link
                document.getElementById('copyLinkBtn').addEventListener('click', () => {
                    navigator.clipboard.writeText(img.cloudinary_url);
                    const btn = document.getElementById('copyLinkBtn');
                    btn.textContent = 'Copied!';
                    setTimeout(() => { btn.textContent = 'Copy Link'; }, 2000);
                });

                // Previous / Next (fetch all IDs and navigate)
                const allData = await fetchMedia({ limit: 100 });
                const ids = allData.items ? allData.items.map(i => i.id) : allData.map(i => i.id);
                const currentIndex = ids.indexOf(imageId);

                document.getElementById('prevBtn').addEventListener('click', () => {
                    const newIndex = currentIndex > 0 ? currentIndex - 1 : ids.length - 1;
                    window.location.href = `image.html?id=${ids[newIndex]}`;
                });
                document.getElementById('nextBtn').addEventListener('click', () => {
                    const newIndex = currentIndex < ids.length - 1 ? currentIndex + 1 : 0;
                    window.location.href = `image.html?id=${ids[newIndex]}`;
                });

                // Related images (first 4 excluding current)
                const related = allData.items.filter(i => i.id !== imageId).slice(0, 4);
                const relatedGrid = document.getElementById('relatedGrid');
                relatedGrid.innerHTML = '';
                related.forEach(r => {
                    const card = document.createElement('article');
                    card.className = 'gallery-card';
                    card.innerHTML = `
                        <a href="image.html?id=${r.id}" class="card-link">
                            <div class="card-img-wrap">
                                <img src="${r.cloudinary_url}" alt="${r.title}" loading="lazy" class="card-img">
                            </div>
                            <div class="card-body">
                                <h3 class="card-title">${r.title}</h3>
                                <p class="card-sub">${r.country || ''} • ${r.source || ''}</p>
                            </div>
                        </a>`;
                    relatedGrid.appendChild(card);
                });

            } catch (err) {
                console.error('Error loading image:', err);
                document.body.innerHTML += '<p style="text-align:center">Could not load image details.</p>';
            }
        }

        loadDetail();
    </script>
</body>
</html>
