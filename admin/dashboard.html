<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Novichok Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <header class="site-header">
        <span class="site-title">Novichok</span>
    </header>

    <main class="admin-container">
        <h2 style="margin-bottom:20px;">Dashboard</h2>

        <div class="nav-links">
            <a href="upload.html" class="btn btn-primary">Upload Media</a>
            <a href="edit.html" class="btn btn-outline">Manage Media</a>
        </div>

        <div class="dashboard-grid" id="statsGrid">
            <div class="stat-card"><h3>Total Images</h3><div class="stat-value">—</div></div>
            <div class="stat-card"><h3>Storage Used</h3><div class="stat-value">—</div></div>
        </div>

        <button onclick="logout()" class="btn btn-outline" style="margin-top:10px;">Logout</button>
    </main>

    <footer class="admin-footer">
        made by 
        <a href="https://x.com/SkywardAdi" target="_blank" rel="noopener">x/skyward (@SkywardAdi)</a>
        &amp;
        <a href="https://x.com/adeep_ag" target="_blank" rel="noopener">x/adeep_ag (@adeep_ag)</a>
    </footer>

    <script>
        const token = localStorage.getItem('admin_token');
        if (!token) window.location.href = 'login.html';

        async function loadStats() {
            try {
                const res = await fetch('https://novichok-api.onrender.com/admin/stats', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.querySelectorAll('.stat-value')[0].textContent = data.totalImages || 0;
                    document.querySelectorAll('.stat-value')[1].textContent = data.storageUsedFormatted || '0 MB';
                }
            } catch (e) {
                console.error('Stats failed:', e);
            }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            window.location.href = 'login.html';
        }

        loadStats();
    </script>
</body>
</html>
