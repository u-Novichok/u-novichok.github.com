<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Novichok</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <header class="site-header">
        <span class="site-title">Novichok</span>
    </header>

    <main class="admin-container" style="display:flex; align-items:center; justify-content:center;">
        <div class="admin-card" style="width:100%; max-width:420px;">
            <h2>Admin Login</h2>
            <div id="message" class="message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
        </div>
    </main>

    <footer class="admin-footer">
        made by 
        <a href="https://x.com/SkywardAdi" target="_blank" rel="noopener">x/skyward (@SkywardAdi)</a>
        &amp;
        <a href="https://x.com/adeep_ag" target="_blank" rel="noopener">x/adeep_ag (@adeep_ag)</a>
    </footer>

    <script>
        const form = document.getElementById('loginForm');
        const msgDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            msgDiv.textContent = '';
            msgDiv.className = 'message';

            try {
                const res = await fetch('https://novichok-api.onrender.com/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok && data.access_token) {
                    localStorage.setItem('admin_token', data.access_token);
                    msgDiv.textContent = 'Login successful! Redirecting…';
                    msgDiv.className = 'message message-success';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    msgDiv.textContent = 'Invalid credentials';
                    msgDiv.className = 'message message-error';
                }
            } catch (err) {
                msgDiv.textContent = 'Network error, please try again.';
                msgDiv.className = 'message message-error';
            }
        });
    </script>
</body>
</html>
