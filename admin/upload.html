<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Media — Novichok Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <header class="site-header">
        <span class="site-title">Novichok</span>
    </header>

    <main class="admin-container">
        <div class="admin-card">
            <h2>Upload Media</h2>
            <div id="msg" class="message"></div>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description"></textarea>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" value="OSINT">
                </div>
                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" id="country">
                </div>
                <div class="form-group">
                    <label for="source">Source</label>
                    <input type="text" id="source">
                </div>
                <div class="form-group">
                    <label for="capture_date">Capture Date</label>
                    <input type="date" id="capture_date">
                </div>
                <div class="form-group">
                    <label for="resolution">Resolution</label>
                    <input type="text" id="resolution">
                </div>
                <div class="form-group">
                    <label for="tags">Tags (comma separated)</label>
                    <input type="text" id="tags">
                </div>
                <div class="form-group">
                    <label for="parent_id">Group ID (optional, for multi‑media posts)</label>
                    <input type="number" id="parent_id" placeholder="Leave blank for standalone">
                </div>
                <div class="form-group">
                    <label for="file">Media File *</label>
                    <input type="file" id="file" accept="image/*,video/*" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Upload</button>
            </form>
        </div>
        <p style="text-align:center;"><a href="dashboard.html">← Back to Dashboard</a></p>
    </main>

    <footer class="admin-footer">
        made by 
        <a href="https://x.com/SkywardAdi" target="_blank" rel="noopener">x/skyward (@SkywardAdi)</a>
        &amp;
        <a href="https://x.com/adeep_ag" target="_blank" rel="noopener">x/adeep_ag (@adeep_ag)</a>
    </footer>

    <script>
        const token = localStorage.getItem('admin_token');
        if (!token) window.location.href = 'login.html';

        const form = document.getElementById('uploadForm');
        const msgDiv = document.getElementById('msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msgDiv.textContent = 'Uploading...';
            msgDiv.className = 'message';

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('country', document.getElementById('country').value);
            formData.append('source', document.getElementById('source').value);
            formData.append('capture_date', document.getElementById('capture_date').value);
            formData.append('resolution', document.getElementById('resolution').value);
            formData.append('tags', document.getElementById('tags').value);
            formData.append('file', document.getElementById('file').files[0]);

            const parentId = document.getElementById('parent_id').value;
            if (parentId) formData.append('parent_id', parentId);

            try {
                const res = await fetch('https://novichok-api.onrender.com/admin/upload', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    msgDiv.textContent = `Success! ID: ${data.id} — URL: ${data.url}`;
                    msgDiv.className = 'message message-success';
                    form.reset();
                } else {
                    msgDiv.textContent = 'Error: ' + (data.detail || JSON.stringify(data));
                    msgDiv.className = 'message message-error';
                }
            } catch (err) {
                msgDiv.textContent = 'Network error.';
                msgDiv.className = 'message message-error';
            }
        });
    </script>
</body>
</html>
