<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Media — Novichok Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <header class="site-header">
        <span class="site-title">Novichok</span>
    </header>

    <main class="admin-container">
        <div class="admin-card">
            <h2>Manage Media</h2>
            <div id="msg" class="message"></div>
            <div id="imageList" class="image-list">Loading...</div>
        </div>
        <p style="text-align:center;"><a href="dashboard.html">← Back to Dashboard</a></p>
    </main>

    <footer class="admin-footer">
        made by 
        <a href="https://x.com/SkywardAdi" target="_blank" rel="noopener">x/skyward (@SkywardAdi)</a>
        &amp;
        <a href="https://x.com/adeep_ag" target="_blank" rel="noopener">x/adeep_ag (@adeep_ag)</a>
    </footer>

    <script>
        const token = localStorage.getItem('admin_token');
        if (!token) window.location.href = 'login.html';

        async function loadImages() {
            const listDiv = document.getElementById('imageList');
            try {
                const res = await fetch('https://novichok-api.onrender.com/media?limit=50');
                const data = await res.json();
                const items = data.items || data;
                if (!items || items.length === 0) {
                    listDiv.innerHTML = '<p>No media yet.</p>';
                    return;
                }
                listDiv.innerHTML = '';
                items.forEach(img => {
                    const row = document.createElement('div');
                    row.className = 'image-row';
                    const thumb = img.media_type === 'video' 
                        ? `<video src="${img.cloudinary_url}" style="width:60px;height:45px;object-fit:cover;border-radius:4px;margin-right:15px;" muted></video>`
                        : `<img src="${img.cloudinary_url}" alt="${img.title}" style="width:60px;height:45px;object-fit:cover;border-radius:4px;margin-right:15px;">`;
                    row.innerHTML = `
                        ${thumb}
                        <div class="image-info">
                            <h4>${img.title} ${img.media_type === 'video' ? '🎬' : ''}</h4>
                            <span>ID: ${img.id} | ${img.country || ''} • ${img.source || ''}</span>
                        </div>
                        <div class="image-actions">
                            <button class="btn btn-danger" data-id="${img.id}">Delete</button>
                        </div>
                    `;
                    listDiv.appendChild(row);
                });

                document.querySelectorAll('.btn-danger').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.getAttribute('data-id');
                        if (!confirm('Delete this permanently?')) return;
                        try {
                            const delRes = await fetch(`https://novichok-api.onrender.com/admin/media/${id}`, {
                                method: 'DELETE',
                                headers: { 'Authorization': 'Bearer ' + token }
                            });
                            if (delRes.ok) {
                                document.getElementById('msg').textContent = 'Deleted successfully.';
                                document.getElementById('msg').className = 'message message-success';
                                loadImages();
                            } else {
                                const err = await delRes.json();
                                document.getElementById('msg').textContent = 'Error: ' + err.detail;
                                document.getElementById('msg').className = 'message message-error';
                            }
                        } catch (err) {
                            document.getElementById('msg').textContent = 'Network error.';
                            document.getElementById('msg').className = 'message message-error';
                        }
                    });
                });
            } catch (err) {
                listDiv.innerHTML = '<p>Failed to load media.</p>';
            }
        }

        loadImages();
    </script>
</body>
</html>
